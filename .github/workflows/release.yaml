name: Release

on:
  pull_request:
    types: [closed]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Only run when a PR with the 'release' label is merged
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to walk commits

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/selfa/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from RelNotes commits
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Extract every line that starts with "RelNotes:" (case-sensitive)
          NOTES=$(git log --format="%B" $RANGE \
            | grep -oP '(?<=RelNotes: ).*' \
            | sed 's/^/- /' \
            || true)

          if [ -z "$NOTES" ]; then
            NOTES="_No release notes in commit messages._"
          fi

          # Store multi-line output safely
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
